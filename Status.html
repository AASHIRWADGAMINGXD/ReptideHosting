<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reptide Hosting - Server Status</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1e1e2f;
      color: #fff;
    }

    header {
      background-color: #2b2b3d;
      padding: 20px 0;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .server-list {
      max-width: 600px;
      margin: 20px auto;
      padding: 10px;
      border-collapse: collapse;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #444;
    }

    th {
      background-color: #2b2b3d;
      color: #ffcc00;
      text-align: center;
    }

    td {
      text-align: center;
    }

    .status-online {
      color: #28a745;
      font-weight: bold;
    }

    .status-ready {
      color: #17a2b8;
      font-weight: bold;
    }

    .status-offline {
      color: #dc3545;
      font-weight: bold;
    }

    .status-error {
      color: #ffc107;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    Reptide Hosting - Minecraft Server Status
  </header>

  <div class="server-list">
    <table>
      <thead>
        <tr>
          <th>Node</th>
          <th>Location</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>India Server</td>
          <td>IND</td>
          <td id="server-status" class="status-error">Checking...</td>
        </tr>
        <tr>
          <td>Server:Error</td>
          <td>Unknown</td>
          <td class="status-offline">Server Not Found!</td>
        </tr>
        <tr>
          <td>Server:Error</td>
          <td>Unknown</td>
          <td class="status-offline">Server Not Found!</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    async function checkServerStatus() {
        const serverIP = "147.185.221.18:41971"; // Replace with your actual server IP
        const apiURL = `https://api.mcsrvstat.us/2/${serverIP}`;
        
        try {
            const response = await fetch(apiURL);
            const data = await response.json();

            const statusElement = document.getElementById("server-status");

            if (data.online) {
                if (data.players.online > 0) {
                    statusElement.innerText = "Online";
                    statusElement.className = "status-online";
                } else {
                    statusElement.innerText = "Ready";
                    statusElement.className = "status-ready";
                }
            } else {
                statusElement.innerText = "Offline";
                statusElement.className = "status-offline";
            }
        } catch (error) {
            document.getElementById("server-status").innerText = "Error";
            document.getElementById("server-status").className = "status-error";
        }
    }

    checkServerStatus();
    setInterval(checkServerStatus, 30000); // Update every 30 seconds
  </script>

</body>
</html>
