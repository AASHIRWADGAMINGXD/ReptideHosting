<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Chats</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --bg: #0f0f13;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --bg4: #252532;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a70;
    --accent: #6c63ff;
    --accent2: #8b82ff;
    --accent-bg: rgba(108,99,255,0.15);
    --accent-border: rgba(108,99,255,0.35);
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --pink: #ec4899;
    --cyan: #06b6d4;
    --sent-bg: #6c63ff;
    --recv-bg: #252532;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 20px;
    --sidebar-w: 300px;
    --info-w: 280px;
    --transition: 0.18s ease;
  }

  /* THEMES */
  [data-theme="light"] {
    --bg: #f5f5f7; --bg2: #ffffff; --bg3: #ebebef; --bg4: #dddde5;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --text: #1a1a2e; --text2: #555570; --text3: #9090aa;
    --accent: #5a52e0; --accent2: #7a72f0; --accent-bg: rgba(90,82,224,0.1);
    --accent-border: rgba(90,82,224,0.3); --recv-bg: #ebebef;
  }
  [data-theme="midnight"] {
    --bg: #030712; --bg2: #0a0f1e; --bg3: #0f172a; --bg4: #1e293b;
    --border: rgba(148,163,184,0.1); --border2: rgba(148,163,184,0.18);
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --accent2: #60a5fa; --accent-bg: rgba(59,130,246,0.15);
    --accent-border: rgba(59,130,246,0.35); --sent-bg: #3b82f6;
  }
  [data-theme="rose"] {
    --bg: #1a0a0f; --bg2: #231018; --bg3: #2d1520; --bg4: #3d1f2d;
    --border: rgba(236,72,153,0.15); --border2: rgba(236,72,153,0.25);
    --text: #fce7f3; --text2: #f9a8d4; --text3: #ec4899;
    --accent: #ec4899; --accent2: #f472b6; --accent-bg: rgba(236,72,153,0.15);
    --accent-border: rgba(236,72,153,0.35); --sent-bg: #be185d;
  }
  [data-theme="forest"] {
    --bg: #051209; --bg2: #0a1f10; --bg3: #0f2d18; --bg4: #163d22;
    --border: rgba(34,197,94,0.12); --border2: rgba(34,197,94,0.2);
    --text: #dcfce7; --text2: #86efac; --text3: #4ade80;
    --accent: #22c55e; --accent2: #4ade80; --accent-bg: rgba(22,197,94,0.15);
    --accent-border: rgba(22,197,94,0.35); --sent-bg: #15803d;
  }
  [data-theme="cyber"] {
    --bg: #000000; --bg2: #080808; --bg3: #111111; --bg4: #1a1a1a;
    --border: rgba(255,255,0,0.15); --border2: rgba(255,255,0,0.25);
    --text: #f0f000; --text2: #c0c000; --text3: #808000;
    --accent: #ff006e; --accent2: #ff4d9e; --accent-bg: rgba(255,0,110,0.15);
    --accent-border: rgba(255,0,110,0.35); --sent-bg: #ff006e;
  }
  [data-theme="lavender"] {
    --bg: #0d0a1a; --bg2: #130f24; --bg3: #1a1530; --bg4: #221d3d;
    --border: rgba(167,139,250,0.15); --border2: rgba(167,139,250,0.25);
    --text: #f3e8ff; --text2: #c4b5fd; --text3: #a78bfa;
    --accent: #a78bfa; --accent2: #c4b5fd; --accent-bg: rgba(167,139,250,0.15);
    --accent-border: rgba(167,139,250,0.35); --sent-bg: #7c3aed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
  input, textarea, button, select { font-family: var(--font); }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* LAYOUT */
  #root { height: 100vh; }
  .app { display: flex; height: 100vh; background: var(--bg); }

  /* AUTH */
  .auth-wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 50%, var(--accent-bg) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(139,82,255,0.08) 0%, transparent 50%);
  }
  .auth-card {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 24px; padding: 48px 40px; width: 420px; max-width: 95vw;
  }
  .auth-logo { font-size: 28px; font-weight: 600; color: var(--text); margin-bottom: 6px; letter-spacing: -0.5px; }
  .auth-logo span { color: var(--accent2); }
  .auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
  .auth-tabs { display: flex; background: var(--bg3); border-radius: var(--radius); padding: 4px; margin-bottom: 28px; }
  .auth-tab {
    flex: 1; padding: 9px; text-align: center; cursor: pointer; border-radius: 9px;
    font-size: 14px; font-weight: 500; color: var(--text2); transition: var(--transition);
    border: none; background: none;
  }
  .auth-tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .field input {
    width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none;
    transition: var(--transition);
  }
  .field input:focus { border-color: var(--accent-border); background: var(--bg4); }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; border-radius: var(--radius-sm); border: none;
    cursor: pointer; font-size: 14px; font-weight: 500; transition: var(--transition); outline: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-google {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border2);
    margin-top: 12px;
  }
  .btn-google:hover { background: var(--bg4); border-color: var(--border2); }
  .btn-sm {
    width: auto; padding: 7px 14px; font-size: 13px;
    background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
  }
  .btn-sm:hover { background: var(--accent); color: #fff; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--text3); }
  .error-msg { color: #f87171; font-size: 13px; margin-bottom: 14px; padding: 10px 12px; background: rgba(248,113,113,0.1); border-radius: var(--radius-sm); }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100vh; flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .sidebar-header {
    padding: 18px 16px 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--accent2); }
  .icon-btn {
    width: 34px; height: 34px; border-radius: var(--radius-sm); border: none;
    background: none; color: var(--text2); cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: var(--transition); font-size: 18px;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }
  .icon-btn.active { background: var(--accent-bg); color: var(--accent2); }
  .search-wrap { padding: 0 12px 12px; }
  .search-input {
    width: 100%; padding: 9px 12px 9px 34px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none;
    transition: var(--transition);
  }
  .search-input:focus { border-color: var(--accent-border); background: var(--bg4); }
  .search-wrap { position: relative; padding: 0 12px 12px; }
  .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  .sidebar-section { padding: 0 8px; flex: 1; overflow-y: auto; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em;
    text-transform: uppercase; padding: 10px 8px 6px;
  }
  .conv-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: var(--radius);
    cursor: pointer; transition: var(--transition); position: relative;
  }
  .conv-item:hover { background: var(--bg3); }
  .conv-item.active { background: var(--accent-bg); }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: #fff; overflow: hidden; position: relative;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-sm { width: 32px; height: 32px; font-size: 12px; }
  .presence-dot {
    width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg2);
    position: absolute; bottom: 1px; right: 1px;
  }
  .dot-online { background: var(--green); }
  .dot-offline { background: var(--text3); }
  .dot-dnd { background: var(--red); }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .conv-time { font-size: 11px; color: var(--text3); }
  .unread-badge {
    background: var(--accent); color: #fff; font-size: 11px; font-weight: 600;
    min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; padding: 0 4px;
  }
  .sidebar-footer {
    padding: 12px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .my-profile { flex: 1; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .my-name { font-size: 13px; font-weight: 500; }
  .my-status { font-size: 12px; color: var(--text2); }

  /* CHAT AREA */
  .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .chat-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--bg2); flex-shrink: 0;
  }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-name { font-size: 16px; font-weight: 600; }
  .chat-header-sub { font-size: 13px; color: var(--text2); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
  .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.sent { flex-direction: row-reverse; }
  .msg-avatar { flex-shrink: 0; }
  .msg-avatar .avatar { width: 28px; height: 28px; font-size: 11px; }
  .msg-bubble {
    max-width: 65%; padding: 9px 13px; border-radius: 18px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
  }
  .msg-bubble.sent {
    background: var(--sent-bg); color: #fff; border-bottom-right-radius: 5px;
  }
  .msg-bubble.recv {
    background: var(--recv-bg); color: var(--text); border-bottom-left-radius: 5px;
  }
  .msg-bubble img { max-width: 220px; border-radius: 10px; display: block; }
  .msg-meta { font-size: 11px; color: var(--text3); padding: 0 4px; display: flex; align-items: center; gap: 4px; }
  .msg-meta.sent { justify-content: flex-end; }
  .tick { font-size: 13px; }
  .tick.read { color: var(--cyan); }
  .chat-input-area {
    padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
  }
  .chat-input-row {
    display: flex; align-items: flex-end; gap: 8px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 8px 12px;
    transition: var(--transition);
  }
  .chat-input-row:focus-within { border-color: var(--accent-border); }
  .chat-textarea {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-size: 14px; resize: none; max-height: 100px; font-family: var(--font);
    line-height: 1.5; padding: 3px 0;
  }
  .chat-textarea::placeholder { color: var(--text3); }
  .send-btn {
    width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
    border: none; color: #fff; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: var(--transition); font-size: 16px;
  }
  .send-btn:hover { background: var(--accent2); transform: scale(1.08); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .gif-btn { color: var(--text2); cursor: pointer; background: none; border: none; font-size: 18px; padding: 2px 4px; transition: var(--transition); }
  .gif-btn:hover { color: var(--accent2); }

  /* EMPTY STATE */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: var(--text3);
  }
  .empty-icon { font-size: 64px; opacity: 0.3; }
  .empty-title { font-size: 20px; font-weight: 500; color: var(--text2); }
  .empty-sub { font-size: 14px; text-align: center; max-width: 300px; line-height: 1.6; }

  /* INFO PANEL */
  .info-panel {
    width: var(--info-w); background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100vh; overflow-y: auto; flex-shrink: 0;
  }
  .info-section { padding: 20px 16px; border-bottom: 1px solid var(--border); }
  .info-section:last-child { border-bottom: none; }
  .info-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  .info-name { font-size: 18px; font-weight: 600; text-align: center; margin: 12px 0 4px; }
  .info-username { font-size: 13px; color: var(--text2); text-align: center; }
  .info-bio { font-size: 13px; color: var(--text2); line-height: 1.5; margin-top: 10px; }
  .status-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 20px;
    padding: 28px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: none; } }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .modal-close {
    position: absolute; top: 20px; right: 20px; background: none; border: none;
    color: var(--text2); cursor: pointer; font-size: 20px;
  }

  /* GIF PICKER */
  .gif-panel {
    position: absolute; bottom: 80px; left: 16px; right: 16px;
    background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg);
    z-index: 50; padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.15s ease;
    max-height: 340px; display: flex; flex-direction: column;
  }
  .gif-search { width: 100%; padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none; margin-bottom: 10px; }
  .gif-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; overflow-y: auto; flex: 1; }
  .gif-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: var(--transition); }
  .gif-thumb:hover { opacity: 0.8; transform: scale(1.03); }

  /* THEMES PANEL */
  .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .theme-swatch {
    aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 2px solid transparent;
    transition: var(--transition); position: relative; overflow: hidden;
  }
  .theme-swatch.active { border-color: var(--accent2); }
  .theme-swatch:hover { transform: scale(1.06); }
  .theme-swatch span { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 9px; font-weight: 600; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

  /* SEARCH RESULTS */
  .search-results {
    position: absolute; top: 100%; left: 12px; right: 12px; background: var(--bg2);
    border: 1px solid var(--border2); border-radius: var(--radius); z-index: 20;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4); overflow: hidden;
  }
  .search-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; transition: var(--transition); }
  .search-result-item:hover { background: var(--bg3); }

  /* SKELETON */
  .skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius-sm); }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* PROFILE EDIT */
  .avatar-upload { position: relative; cursor: pointer; display: inline-block; }
  .avatar-upload-overlay {
    position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition);
    font-size: 20px; color: #fff;
  }
  .avatar-upload:hover .avatar-upload-overlay { opacity: 1; }
  .big-avatar { width: 80px; height: 80px; font-size: 28px; margin: 0 auto 12px; }

  /* MEMBERS LIST */
  .member-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius-sm); transition: var(--transition); }
  .member-item:hover { background: var(--bg3); }
  .member-role { font-size: 11px; color: var(--accent2); background: var(--accent-bg); border: 1px solid var(--accent-border); border-radius: 4px; padding: 2px 6px; font-weight: 500; }

  /* STATUS PICKER */
  .status-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-opt {
    display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500;
    transition: var(--transition); background: none; color: var(--text);
  }
  .status-opt:hover { border-color: var(--border2); background: var(--bg3); }
  .status-opt.active { border-color: var(--accent-border); background: var(--accent-bg); color: var(--accent2); }

  /* TYPING INDICATOR */
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 13px; background: var(--recv-bg); border-radius: 18px; border-bottom-left-radius: 5px; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }

  /* TABS */
  .tab-row { display: flex; padding: 4px; background: var(--bg3); border-radius: var(--radius); gap: 4px; margin-bottom: 14px; }
  .tab { flex: 1; padding: 8px; text-align: center; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: var(--transition); border: none; background: none; }
  .tab.active { background: var(--bg2); color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 10px 20px; font-size: 14px; z-index: 200; animation: toastIn 0.2s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%); } }

  /* MOBILE */
  @media (max-width: 768px) {
    :root { --sidebar-w: 100vw; --info-w: 100vw; }
    .app { position: relative; }
    .info-panel { position: absolute; right: -100%; transition: right 0.25s ease; }
    .info-panel.open { right: 0; }
    .sidebar { position: absolute; left: 0; z-index: 30; transition: transform 0.25s ease; }
    .sidebar.hidden { transform: translateX(-100%); }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2);
      border-top: 1px solid var(--border); display: flex; z-index: 40; padding: 8px 0 12px;
    }
    .bottom-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text3); cursor: pointer; font-size: 22px; border: none; background: none; padding: 4px; }
    .bottom-nav-btn.active { color: var(--accent2); }
    .bottom-nav-label { font-size: 10px; font-weight: 500; }
    .chat-messages { padding-bottom: 70px; }
    .chat-input-area { padding-bottom: 80px; }
  }
  @media (min-width: 769px) { .bottom-nav { display: none; } }
  @media (max-width: 1024px) { .info-panel { display: none; } }
  @media (min-width: 1025px) { .info-panel { display: flex; } }

  /* UTILS */
  .flex { display: flex; } .flex-col { display: flex; flex-direction: column; }
  .items-center { align-items: center; } .justify-center { justify-content: center; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
  .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
  .w-full { width: 100%; } .text-sm { font-size: 13px; } .text-muted { color: var(--text2); }
  .center { text-align: center; } .bold { font-weight: 600; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
  .tag-accent { background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent-border); }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Firebase init ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCD03oRPDmbXuciCCClXYZXQgMHt9byyGM",
  authDomain: "telegram-app-cd720.firebaseapp.com",
  databaseURL: "https://telegram-app-cd720-default-rtdb.firebaseio.com",
  projectId: "telegram-app-cd720",
  storageBucket: "telegram-app-cd720.firebasestorage.app",
  messagingSenderId: "161717970897",
  appId: "1:161717970897:web:02af6249344449514fa2f0",
  measurementId: "G-HLH5D10X8H"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();
const rtdb = firebase.database();

// ── Helpers ────────────────────────────────────────────────────
const avatarColors = ['#6c63ff','#ec4899','#22c55e','#f59e0b','#06b6d4','#a855f7','#f97316','#14b8a6'];
const getAvatarColor = (uid) => uid ? avatarColors[uid.charCodeAt(0) % avatarColors.length] : avatarColors[0];
const getInitials = (name) => name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) : '?';
const chatId = (a, b) => [a, b].sort().join('_');
const fmtTime = (ts) => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  if (diff < 172800) return 'Yesterday';
  return d.toLocaleDateString([], {month:'short',day:'numeric'});
};
const themes = [
  {id:'dark', label:'Dark', bg:'#0f0f13', accent:'#6c63ff'},
  {id:'light', label:'Light', bg:'#f5f5f7', accent:'#5a52e0'},
  {id:'midnight', label:'Midnight', bg:'#030712', accent:'#3b82f6'},
  {id:'rose', label:'Rose Gold', bg:'#1a0a0f', accent:'#ec4899'},
  {id:'forest', label:'Forest', bg:'#051209', accent:'#22c55e'},
  {id:'cyber', label:'Cyber', bg:'#000000', accent:'#ff006e'},
  {id:'lavender', label:'Lavender', bg:'#0d0a1a', accent:'#a78bfa'},
];
const GIPHY_KEY = 'GlVGYHkr3WSBnllca54iNt0yFbjz7L59'; // public demo key

// ── Toast ──────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ── Avatar component ───────────────────────────────────────────
function Avatar({ user, size='md', showPresence, presenceState }) {
  const cls = `avatar${size === 'sm' ? ' avatar-sm' : size === 'lg' ? ' big-avatar' : ''}`;
  const bg = getAvatarColor(user?.uid || user?.id || '');
  return (
    <div className={cls} style={{ background: bg }}>
      {user?.photoURL ? <img src={user.photoURL} alt="" /> : getInitials(user?.displayName || user?.username || '?')}
      {showPresence && (
        <span className={`presence-dot dot-${presenceState || 'offline'}`} />
      )}
    </div>
  );
}

// ── Auth Screen ────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState(''); const [pass, setPass] = useState('');
  const [name, setName] = useState(''); const [username, setUsername] = useState('');
  const [err, setErr] = useState(''); const [loading, setLoading] = useState(false);

  const createUserDoc = async (user, extra = {}) => {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      const uname = extra.username || user.email.split('@')[0].replace(/\W/g,'').toLowerCase() + Math.floor(Math.random()*999);
      await ref.set({
        displayName: extra.displayName || user.displayName || user.email.split('@')[0],
        username: uname,
        email: user.email,
        photoURL: user.photoURL || '',
        bio: '',
        theme: 'dark',
        status: 'online',
        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
  };

  const handleSubmit = async () => {
    setErr(''); setLoading(true);
    try {
      if (tab === 'login') {
        const { user } = await auth.signInWithEmailAndPassword(email, pass);
        await createUserDoc(user);
      } else {
        if (!name.trim() || !username.trim()) { setErr('Name and username required'); setLoading(false); return; }
        const un = username.trim().toLowerCase().replace(/\W/g,'');
        const existing = await db.collection('users').where('username','==',un).get();
        if (!existing.empty) { setErr('Username taken'); setLoading(false); return; }
        const { user } = await auth.createUserWithEmailAndPassword(email, pass);
        await user.updateProfile({ displayName: name.trim() });
        await createUserDoc(user, { displayName: name.trim(), username: un });
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const handleGoogle = async () => {
    setErr(''); setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const { user } = await auth.signInWithPopup(provider);
      await createUserDoc(user);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">Infinite<span>Chats</span></div>
        <div className="auth-sub">Connect with anyone, anywhere, in real time.</div>
        <div className="auth-tabs">
          <button className={`auth-tab${tab==='login'?' active':''}`} onClick={()=>setTab('login')}>Sign In</button>
          <button className={`auth-tab${tab==='signup'?' active':''}`} onClick={()=>setTab('signup')}>Sign Up</button>
        </div>
        {err && <div className="error-msg">{err}</div>}
        {tab === 'signup' && <>
          <div className="field"><label>Full Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Jane Doe" /></div>
          <div className="field"><label>Username</label><input value={username} onChange={e=>setUsername(e.target.value)} placeholder="janedoe" /></div>
        </>}
        <div className="field"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" /></div>
        <div className="field"><label>Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&handleSubmit()} /></div>
        <button className="btn btn-primary" onClick={handleSubmit} disabled={loading}>
          {loading ? <div className="spinner" /> : (tab==='login' ? 'Sign In' : 'Create Account')}
        </button>
        <div className="divider"><span>or</span></div>
        <button className="btn btn-google" onClick={handleGoogle} disabled={loading}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
          Continue with Google
        </button>
      </div>
    </div>
  );
}

// ── GIF Picker ─────────────────────────────────────────────────
function GifPicker({ onSelect, onClose }) {
  const [q, setQ] = useState(''); const [gifs, setGifs] = useState([]); const [loading, setLoading] = useState(false);
  const timerRef = useRef(null);
  const search = async (query) => {
    setLoading(true);
    try {
      const endpoint = query
        ? `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=18&rating=g`
        : `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=18&rating=g`;
      const res = await fetch(endpoint);
      const data = await res.json();
      setGifs(data.data || []);
    } catch(e) { console.log('GIF error', e); }
    setLoading(false);
  };
  useEffect(() => { search(''); }, []);
  const handleQ = (v) => {
    setQ(v); clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => search(v), 400);
  };
  return (
    <div className="gif-panel">
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input className="gif-search" style={{flex:1}} placeholder="Search GIFs…" value={q} onChange={e=>handleQ(e.target.value)} autoFocus />
        <button className="icon-btn" onClick={onClose}>✕</button>
      </div>
      {loading ? <div style={{display:'flex',justifyContent:'center',padding:20}}><div className="spinner"/></div> : (
        <div className="gif-grid">
          {gifs.map(g => (
            <img key={g.id} className="gif-thumb" src={g.images.fixed_width_small.url} alt={g.title} onClick={()=>onSelect(g.images.downsized.url)} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Profile Modal ──────────────────────────────────────────────
function ProfileModal({ user, myUid, onClose, onSave }) {
  const editable = user.uid === myUid;
  const [name, setName] = useState(user.displayName || '');
  const [bio, setBio] = useState(user.bio || '');
  const [saving, setSaving] = useState(false);
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  const handleSave = async () => {
    setSaving(true);
    await db.collection('users').doc(myUid).update({ displayName: name, bio });
    onSave({ ...user, displayName: name, bio });
    setSaving(false); onClose();
  };
  const handlePhoto = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setUploading(true);
    const ref = storage.ref(`avatars/${myUid}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    await db.collection('users').doc(myUid).update({ photoURL: url });
    await auth.currentUser.updateProfile({ photoURL: url });
    onSave({ ...user, photoURL: url });
    setUploading(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{position:'relative'}}>
        <div className="modal-title">{editable ? 'Edit Profile' : 'Profile'}</div>
        <div className="center">
          {editable ? (
            <div className="avatar-upload" onClick={()=>fileRef.current.click()}>
              <div className="avatar big-avatar" style={{background:getAvatarColor(user.uid)}}>
                {user.photoURL ? <img src={user.photoURL} alt="" /> : getInitials(user.displayName)}
              </div>
              <div className="avatar-upload-overlay">{uploading ? <div className="spinner"/> : '📷'}</div>
              <input ref={fileRef} type="file" accept="image/*" hidden onChange={handlePhoto} />
            </div>
          ) : (
            <div className="avatar big-avatar" style={{background:getAvatarColor(user.uid),margin:'0 auto 12px'}}>
              {user.photoURL ? <img src={user.photoURL} alt="" /> : getInitials(user.displayName)}
            </div>
          )}
          <div className="info-name">{user.displayName}</div>
          <div className="info-username">@{user.username}</div>
        </div>
        {editable ? <>
          <div className="field mt-3"><label>Display Name</label><input value={name} onChange={e=>setName(e.target.value)} /></div>
          <div className="field"><label>Bio</label><input value={bio} onChange={e=>setBio(e.target.value)} placeholder="About me…" /></div>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn btn-sm" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={handleSave} disabled={saving}>
              {saving?<div className="spinner"/>:'Save'}
            </button>
          </div>
        </> : <>
          {user.bio && <p className="info-bio">{user.bio}</p>}
          <button className="btn btn-sm mt-4" style={{width:'100%'}} onClick={onClose}>Close</button>
        </>}
      </div>
    </div>
  );
}

// ── Create Group Modal ─────────────────────────────────────────
function CreateGroupModal({ myUid, onClose, onCreate }) {
  const [name, setName] = useState(''); const [members, setMembers] = useState([]);
  const [search, setSearch] = useState(''); const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  const searchUsers = async (q) => {
    if (q.length < 2) { setResults([]); return; }
    const snap = await db.collection('users').where('username','>=',q).where('username','<=',q+'\uf8ff').limit(8).get();
    setResults(snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.id!==myUid));
  };
  const toggleMember = (u) => setMembers(m => m.find(x=>x.id===u.id) ? m.filter(x=>x.id!==u.id) : [...m,u]);

  const handleCreate = async () => {
    if (!name.trim()) return; setLoading(true);
    const token = Math.random().toString(36).slice(2,10);
    const docRef = await db.collection('groups').add({
      name: name.trim(), photoURL: '', createdBy: myUid,
      admins: [myUid], members: [myUid, ...members.map(m=>m.id)],
      inviteLink: token, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    onCreate({ id: docRef.id, name: name.trim(), members: [myUid,...members.map(m=>m.id)], admins:[myUid], inviteLink:token });
    setLoading(false); onClose();
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">New Group</div>
        <div className="field"><label>Group Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Team Alpha" /></div>
        <div className="field" style={{position:'relative'}}>
          <label>Add Members</label>
          <input value={search} onChange={e=>{setSearch(e.target.value);searchUsers(e.target.value);}} placeholder="Search username…" />
          {results.length > 0 && (
            <div className="search-results" style={{top:'calc(100% + 4px)'}}>
              {results.map(u=>(
                <div key={u.id} className="search-result-item" onClick={()=>{toggleMember(u);setSearch('');setResults([]);}}>
                  <Avatar user={u} size="sm" />
                  <div>
                    <div className="text-sm bold">{u.displayName}</div>
                    <div className="text-sm text-muted">@{u.username}</div>
                  </div>
                  {members.find(m=>m.id===u.id) && <span style={{marginLeft:'auto',color:'var(--green)'}}>✓</span>}
                </div>
              ))}
            </div>
          )}
        </div>
        {members.length > 0 && (
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            {members.map(m=>(
              <span key={m.id} className="tag tag-accent" style={{cursor:'pointer'}} onClick={()=>toggleMember(m)}>
                {m.displayName} ✕
              </span>
            ))}
          </div>
        )}
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-sm" style={{flex:1}} onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={handleCreate} disabled={loading||!name.trim()}>
            {loading?<div className="spinner"/>:'Create'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Settings Modal ─────────────────────────────────────────────
function SettingsModal({ user, onClose, onThemeChange, onStatusChange }) {
  const [activeTab, setActiveTab] = useState('theme');
  const [status, setStatus] = useState(user.status || 'online');

  const setUserStatus = async (s) => {
    setStatus(s);
    await db.collection('users').doc(user.uid).update({status: s});
    await rtdb.ref(`status/${user.uid}`).update({state: s});
    onStatusChange(s);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">Settings</div>
        <div className="tab-row">
          {['theme','status'].map(t=>(
            <button key={t} className={`tab${activeTab===t?' active':''}`} onClick={()=>setActiveTab(t)}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>
        {activeTab === 'theme' && (
          <div>
            <div className="info-label">Choose Theme</div>
            <div className="theme-grid">
              {themes.map(th=>(
                <div key={th.id} className={`theme-swatch${document.documentElement.getAttribute('data-theme')===th.id?' active':''}`}
                     style={{background:th.bg, border: `2px solid ${document.documentElement.getAttribute('data-theme')===th.id ? th.accent : 'transparent'}`}}
                     onClick={()=>onThemeChange(th.id)}>
                  <div style={{position:'absolute',inset:0,background:`linear-gradient(135deg,${th.bg},${th.accent}33)`,borderRadius:8}} />
                  <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'4px 2px',background:'rgba(0,0,0,0.5)',borderRadius:'0 0 8px 8px'}}>
                    <span style={{position:'static',fontSize:9,color:'#fff',fontWeight:600}}>{th.label}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {activeTab === 'status' && (
          <div>
            <div className="info-label">Your Status</div>
            <div className="status-picker">
              {[['online','🟢','Online'],['dnd','🔴','Do Not Disturb'],['offline','⚫','Appear Offline']].map(([s,icon,label])=>(
                <button key={s} className={`status-opt${status===s?' active':''}`} onClick={()=>setUserStatus(s)}>
                  {icon} {label}
                </button>
              ))}
            </div>
          </div>
        )}
        <button className="btn btn-sm mt-4" style={{width:'100%'}} onClick={onClose}>Done</button>
      </div>
    </div>
  );
}

// ── Group Info Panel content ───────────────────────────────────
function GroupInfo({ group, myUid, members, onInvite }) {
  const isAdmin = group.admins?.includes(myUid);
  return (
    <div>
      <div className="info-section" style={{textAlign:'center'}}>
        <div className="avatar big-avatar" style={{margin:'0 auto 12px',background:getAvatarColor(group.id),fontSize:28}}>
          {group.name?.[0]?.toUpperCase() || 'G'}
        </div>
        <div className="info-name">{group.name}</div>
        <div className="info-username">{members.length} members</div>
        {isAdmin && (
          <button className="btn btn-sm mt-3" onClick={onInvite} style={{width:'auto',margin:'12px auto 0'}}>
            🔗 Copy Invite Link
          </button>
        )}
      </div>
      <div className="info-section">
        <div className="info-label">Members</div>
        {members.map(m=>(
          <div key={m.id} className="member-item">
            <Avatar user={m} size="sm" />
            <div style={{flex:1,minWidth:0}}>
              <div className="text-sm bold" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.displayName}</div>
              <div className="text-sm text-muted">@{m.username}</div>
            </div>
            {group.admins?.includes(m.id) && <span className="member-role">Admin</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Message Bubble ─────────────────────────────────────────────
function MessageBubble({ msg, isSent, sender }) {
  return (
    <div className={`msg-row${isSent?' sent':''}`}>
      {!isSent && (
        <div className="msg-avatar">
          <div className="avatar" style={{width:28,height:28,fontSize:11,background:getAvatarColor(msg.senderId)}}>
            {sender?.photoURL ? <img src={sender.photoURL} alt="" /> : getInitials(sender?.displayName || '?')}
          </div>
        </div>
      )}
      <div>
        {!isSent && sender && <div style={{fontSize:12,color:'var(--text2)',marginBottom:3,paddingLeft:2}}>{sender.displayName}</div>}
        <div className={`msg-bubble${isSent?' sent':' recv'}`}>
          {msg.type==='gif'
            ? <img src={msg.gifUrl} alt="GIF" />
            : msg.text}
        </div>
        <div className={`msg-meta${isSent?' sent':''}`}>
          {fmtTime(msg.timestamp)}
          {isSent && <span className={`tick${msg.read?' read':''}`}>{msg.read ? '✓✓' : '✓'}</span>}
        </div>
      </div>
    </div>
  );
}

// ── Chat Window ────────────────────────────────────────────────
function ChatWindow({ conv, myUid, myUser, allUsers, onHeaderClick }) {
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState('');
  const [showGif, setShowGif] = useState(false);
  const [loading, setLoading] = useState(true);
  const bottomRef = useRef();
  const taRef = useRef();

  const isGroup = conv.type === 'group';
  const colPath = isGroup
    ? `groups/${conv.id}/messages`
    : `chats/${chatId(myUid, conv.id)}/messages`;

  useEffect(() => {
    setLoading(true); setMessages([]);
    const unsub = db.collection(colPath).orderBy('timestamp','asc').limit(200)
      .onSnapshot(snap => {
        const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
        setMessages(msgs); setLoading(false);
        // mark as read
        msgs.filter(m=>m.senderId!==myUid&&!m.read).forEach(m=>{
          db.collection(colPath).doc(m.id).update({read:true}).catch(()=>{});
        });
      });
    return () => unsub();
  }, [conv.id]);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const send = async (type='text', gifUrl='') => {
    if (type==='text' && !text.trim()) return;
    const payload = {
      senderId: myUid,
      text: type==='text' ? text.trim() : '',
      type, gifUrl,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      read: false,
    };
    setText('');
    await db.collection(colPath).add(payload);
  };

  const getSender = (senderId) => allUsers[senderId] || { displayName: 'Unknown', uid: senderId };

  const otherUser = !isGroup ? (allUsers[conv.id] || conv) : null;
  const headerName = isGroup ? conv.name : (otherUser?.displayName || 'User');
  const headerSub = isGroup
    ? `${conv.members?.length || '?'} members`
    : (otherUser?.status === 'online' ? '🟢 Online' : `Last seen ${fmtTime(otherUser?.lastSeen)}`);

  return (
    <div className="chat-area">
      <div className="chat-header">
        <div className="avatar" style={{background:getAvatarColor(conv.id),cursor:'pointer'}} onClick={onHeaderClick}>
          {isGroup
            ? (conv.name?.[0]?.toUpperCase()||'G')
            : (otherUser?.photoURL ? <img src={otherUser.photoURL} alt="" /> : getInitials(otherUser?.displayName||'?'))}
        </div>
        <div className="chat-header-info" style={{cursor:'pointer'}} onClick={onHeaderClick}>
          <div className="chat-header-name">{headerName}</div>
          <div className="chat-header-sub">{headerSub}</div>
        </div>
      </div>

      <div className="chat-messages">
        {loading && [1,2,3].map(i=>(
          <div key={i} className="msg-row" style={{gap:8,marginBottom:12}}>
            <div style={{width:28,height:28,borderRadius:'50%'}} className="skeleton" />
            <div style={{width:`${140+i*40}px`,height:36}} className="skeleton" />
          </div>
        ))}
        {!loading && messages.length === 0 && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,color:'var(--text3)'}}>
            <div style={{fontSize:48}}>💬</div>
            <div style={{fontSize:15,color:'var(--text2)'}}>No messages yet</div>
            <div style={{fontSize:13}}>Say hello!</div>
          </div>
        )}
        {messages.map(m => (
          <MessageBubble key={m.id} msg={m} isSent={m.senderId===myUid} sender={getSender(m.senderId)} />
        ))}
        <div ref={bottomRef} />
      </div>

      {showGif && (
        <div style={{position:'relative'}}>
          <GifPicker
            onSelect={url=>{send('gif',url);setShowGif(false);}}
            onClose={()=>setShowGif(false)}
          />
        </div>
      )}

      <div className="chat-input-area">
        <div className="chat-input-row">
          <button className="gif-btn" onClick={()=>setShowGif(v=>!v)} title="GIF">GIF</button>
          <textarea
            ref={taRef}
            className="chat-textarea"
            rows={1}
            value={text}
            placeholder="Message…"
            onChange={e=>{setText(e.target.value);e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          />
          <button className="send-btn" onClick={()=>send()} disabled={!text.trim()}>▶</button>
        </div>
      </div>
    </div>
  );
}

// ── Sidebar ─────────────────────────────────────────────────────
function Sidebar({ myUser, dms, groups, selected, onSelect, onNewGroup, onSettings, onProfile, presences, allUsers }) {
  const [q, setQ] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const searchRef = useRef(null);

  const doSearch = async (val) => {
    setQ(val);
    if (val.length < 2) { setSearchResults([]); return; }
    setSearching(true);
    const snap = await db.collection('users').where('username','>=',val).where('username','<=',val+'\uf8ff').limit(8).get();
    setSearchResults(snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.id!==myUser.uid));
    setSearching(false);
  };

  const startDm = (u) => { setQ(''); setSearchResults([]); onSelect({...u, type:'dm'}); };

  const getDotClass = (uid) => {
    const p = presences[uid];
    if (!p) return 'offline';
    return p.state || 'offline';
  };

  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <div className="logo">Infinite<span>Chats</span></div>
        <div style={{display:'flex',gap:4}}>
          <button className="icon-btn" onClick={onNewGroup} title="New Group">⊕</button>
          <button className="icon-btn" onClick={onSettings} title="Settings">⚙</button>
        </div>
      </div>

      <div className="search-wrap" style={{position:'relative'}} ref={searchRef}>
        <span className="search-icon">🔍</span>
        <input
          className="search-input"
          placeholder="Search users…"
          value={q}
          onChange={e=>doSearch(e.target.value)}
        />
        {searchResults.length > 0 && (
          <div className="search-results">
            {searchResults.map(u=>(
              <div key={u.id} className="search-result-item" onClick={()=>startDm(u)}>
                <div className="avatar avatar-sm" style={{background:getAvatarColor(u.id),position:'relative'}}>
                  {u.photoURL?<img src={u.photoURL} alt=""/>:getInitials(u.displayName)}
                  <span className={`presence-dot dot-${getDotClass(u.id)}`} />
                </div>
                <div>
                  <div className="text-sm bold">{u.displayName}</div>
                  <div className="text-sm text-muted">@{u.username}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="sidebar-section">
        {dms.length > 0 && <>
          <div className="section-label">Direct Messages</div>
          {dms.map(dm => {
            const other = allUsers[dm.otherId] || dm;
            const dotState = getDotClass(dm.otherId);
            return (
              <div key={dm.id} className={`conv-item${selected?.id===dm.otherId&&selected?.type==='dm'?' active':''}`}
                   onClick={()=>onSelect({...other,id:dm.otherId,type:'dm'})}>
                <div className="avatar" style={{background:getAvatarColor(dm.otherId),position:'relative'}}>
                  {other.photoURL?<img src={other.photoURL} alt=""/>:getInitials(other.displayName||'?')}
                  <span className={`presence-dot dot-${dotState}`} />
                </div>
                <div className="conv-info">
                  <div className="conv-name">{other.displayName||'User'}</div>
                  <div className="conv-preview">{dm.lastMsg||'Start chatting'}</div>
                </div>
                <div className="conv-meta">
                  <div className="conv-time">{fmtTime(dm.updatedAt)}</div>
                  {dm.unread > 0 && <div className="unread-badge">{dm.unread}</div>}
                </div>
              </div>
            );
          })}
        </>}

        {groups.length > 0 && <>
          <div className="section-label">Groups</div>
          {groups.map(g => (
            <div key={g.id} className={`conv-item${selected?.id===g.id&&selected?.type==='group'?' active':''}`}
                 onClick={()=>onSelect({...g,type:'group'})}>
              <div className="avatar" style={{background:getAvatarColor(g.id)}}>
                {g.photoURL?<img src={g.photoURL} alt=""/>:(g.name?.[0]?.toUpperCase()||'G')}
              </div>
              <div className="conv-info">
                <div className="conv-name">{g.name}</div>
                <div className="conv-preview">{g.members?.length||0} members</div>
              </div>
              <div className="conv-meta">
                {g.unread > 0 && <div className="unread-badge">{g.unread}</div>}
              </div>
            </div>
          ))}
        </>}

        {dms.length === 0 && groups.length === 0 && (
          <div style={{padding:'40px 16px',textAlign:'center',color:'var(--text3)'}}>
            <div style={{fontSize:40,marginBottom:12}}>💬</div>
            <div style={{fontSize:14,marginBottom:8}}>No conversations yet</div>
            <div style={{fontSize:12}}>Search for a user above to start chatting</div>
          </div>
        )}
      </div>

      <div className="sidebar-footer">
        <div className="my-profile" onClick={onProfile}>
          <div className="avatar avatar-sm" style={{background:getAvatarColor(myUser.uid),position:'relative',flexShrink:0}}>
            {myUser.photoURL?<img src={myUser.photoURL} alt=""/>:getInitials(myUser.displayName)}
            <span className={`presence-dot dot-${myUser.status||'online'}`} style={{width:8,height:8,border:'1.5px solid var(--bg2)'}} />
          </div>
          <div>
            <div className="my-name">{myUser.displayName}</div>
            <div className="my-status">@{myUser.username}</div>
          </div>
        </div>
        <button className="icon-btn" onClick={()=>auth.signOut()} title="Sign out">⏻</button>
      </div>
    </div>
  );
}

// ── Info Panel ─────────────────────────────────────────────────
function InfoPanel({ conv, myUid, allUsers, presences, onClose }) {
  if (!conv) return (
    <div className="info-panel">
      <div className="info-section" style={{textAlign:'center',paddingTop:40}}>
        <div style={{fontSize:40,marginBottom:12,opacity:0.3}}>ℹ</div>
        <div style={{color:'var(--text3)',fontSize:14}}>Select a conversation</div>
      </div>
    </div>
  );

  const isGroup = conv.type === 'group';
  const [groupMembers, setGroupMembers] = useState([]);
  useEffect(() => {
    if (!isGroup || !conv.members) return;
    const fetchMembers = async () => {
      const ms = await Promise.all(conv.members.map(uid=>
        db.collection('users').doc(uid).get().then(d=>d.exists?{id:d.id,...d.data()}:null)
      ));
      setGroupMembers(ms.filter(Boolean));
    };
    fetchMembers();
  }, [conv.id]);

  const dotState = !isGroup ? (presences[conv.id]?.state || conv.status || 'offline') : null;

  const copyInvite = () => {
    const link = `${window.location.origin}?invite=${conv.inviteLink}`;
    navigator.clipboard.writeText(link);
  };

  return (
    <div className="info-panel">
      {isGroup ? (
        <GroupInfo group={conv} myUid={myUid} members={groupMembers} onInvite={copyInvite} />
      ) : (
        <>
          <div className="info-section" style={{textAlign:'center'}}>
            <div className="avatar big-avatar" style={{margin:'0 auto 12px',background:getAvatarColor(conv.id)}}>
              {conv.photoURL?<img src={conv.photoURL} alt=""/>:getInitials(conv.displayName)}
            </div>
            <div className="info-name">{conv.displayName}</div>
            <div className="info-username">@{conv.username}</div>
            <div className="status-row" style={{justifyContent:'center'}}>
              <span className={`status-dot dot-${dotState}`} style={{background: dotState==='online'?'var(--green)': dotState==='dnd'?'var(--red)':'var(--text3)'}} />
              <span style={{fontSize:13,color:'var(--text2)'}}>{dotState==='online'?'Online': dotState==='dnd'?'Do Not Disturb':'Offline'}</span>
            </div>
          </div>
          {conv.bio && (
            <div className="info-section">
              <div className="info-label">About</div>
              <p className="info-bio">{conv.bio}</p>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null); // firebase auth user
  const [myUser, setMyUser] = useState(null); // firestore user doc
  const [authReady, setAuthReady] = useState(false);
  const [selected, setSelected] = useState(null);
  const [dms, setDms] = useState([]);
  const [groups, setGroups] = useState([]);
  const [allUsers, setAllUsers] = useState({});
  const [presences, setPresences] = useState({});
  const [showNewGroup, setShowNewGroup] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [showInfoPanel, setShowInfoPanel] = useState(false);
  const [toast, setToast] = useState('');

  const showToast = (msg) => { setToast(msg); };

  // Auth state
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      setUser(u);
      if (u) {
        const snap = await db.collection('users').doc(u.uid).get();
        if (snap.exists) {
          const data = { uid: u.uid, ...snap.data() };
          setMyUser(data);
          document.documentElement.setAttribute('data-theme', data.theme || 'dark');
          setupPresence(u.uid, data);
        }
      } else { setMyUser(null); }
      setAuthReady(true);
    });
    return () => unsub();
  }, []);

  const setupPresence = (uid, userData) => {
    const ref = rtdb.ref(`status/${uid}`);
    const connRef = rtdb.ref('.info/connected');
    connRef.on('value', snap => {
      if (snap.val()) {
        ref.onDisconnect().set({ state: 'offline', lastSeen: firebase.database.ServerValue.TIMESTAMP });
        ref.set({ state: userData.status || 'online', lastSeen: firebase.database.ServerValue.TIMESTAMP });
      }
    });
  };

  // Subscribe to conversations
  useEffect(() => {
    if (!user) return;
    // DMs: look for chats involving this user
    const fetchDms = async () => {
      const snap = await db.collection('chats').where('participants','array-contains',user.uid).get();
      const list = [];
      for (const doc of snap.docs) {
        const data = doc.data();
        const otherId = data.participants.find(p=>p!==user.uid);
        if (!otherId) continue;
        const msgSnap = await db.collection(`chats/${doc.id}/messages`).orderBy('timestamp','desc').limit(1).get();
        const lastMsg = msgSnap.docs[0]?.data();
        const unread = (await db.collection(`chats/${doc.id}/messages`).where('senderId','!=',user.uid).where('read','==',false).get()).size;
        list.push({ id: doc.id, otherId, lastMsg: lastMsg?.text||lastMsg?.gifUrl&&'GIF'||'', updatedAt: lastMsg?.timestamp, unread });
      }
      setDms(list);
      // fetch other users
      const uids = [...new Set(list.map(d=>d.otherId))];
      for (const uid of uids) {
        if (!allUsers[uid]) {
          const s = await db.collection('users').doc(uid).get();
          if (s.exists) setAllUsers(prev=>({...prev,[uid]:{id:uid,...s.data()}}));
        }
      }
    };
    fetchDms();

    // Groups
    const unsubGroups = db.collection('groups').where('members','array-contains',user.uid)
      .onSnapshot(snap => {
        setGroups(snap.docs.map(d=>({id:d.id,...d.data()})));
      });

    return () => { unsubGroups(); };
  }, [user]);

  // Listen presences
  useEffect(() => {
    if (!user) return;
    const ref = rtdb.ref('status');
    ref.on('value', snap => {
      setPresences(snap.val() || {});
    });
    return () => ref.off();
  }, [user]);

  // Update allUsers when selected changes
  useEffect(() => {
    if (!selected || !user) return;
    if (selected.type === 'dm' && !allUsers[selected.id]) {
      db.collection('users').doc(selected.id).get().then(s=>{
        if (s.exists) setAllUsers(prev=>({...prev,[selected.id]:{id:s.id,...s.data()}}));
      });
    }
    if (selected.type === 'dm') {
      // Ensure chat doc exists
      const cid = chatId(user.uid, selected.id);
      db.collection('chats').doc(cid).set({
        participants: [user.uid, selected.id].sort(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      }, {merge:true}).then(()=>{
        // Refresh dms
        db.collection('chats').where('participants','array-contains',user.uid).get().then(snap=>{
          const list = snap.docs.map(doc=>{
            const data = doc.data();
            const otherId = data.participants.find(p=>p!==user.uid);
            return { id:doc.id, otherId, lastMsg:'', updatedAt:data.createdAt, unread:0 };
          });
          setDms(prev=>{
            const ids = new Set(prev.map(d=>d.id));
            const newOnes = list.filter(d=>!ids.has(d.id));
            return [...prev, ...newOnes];
          });
        });
      });
    }
  }, [selected]);

  const handleThemeChange = async (themeId) => {
    document.documentElement.setAttribute('data-theme', themeId);
    if (user) await db.collection('users').doc(user.uid).update({ theme: themeId });
  };

  const handleStatusChange = (s) => {
    setMyUser(prev=>({...prev,status:s}));
  };

  const handleProfileSave = (updated) => {
    setMyUser(prev=>({...prev,...updated}));
    if (selected && allUsers[selected.id]) {
      setAllUsers(prev=>({...prev,[user.uid]:{...prev[user.uid],...updated}}));
    }
  };

  if (!authReady) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div className="spinner" style={{width:40,height:40,borderWidth:3}} />
    </div>
  );

  if (!user || !myUser) return <AuthScreen onAuth={() => {}} />;

  return (
    <div className="app">
      <Sidebar
        myUser={myUser}
        dms={dms}
        groups={groups}
        selected={selected}
        onSelect={setSelected}
        onNewGroup={()=>setShowNewGroup(true)}
        onSettings={()=>setShowSettings(true)}
        onProfile={()=>setShowProfile(true)}
        presences={presences}
        allUsers={{...allUsers,[user.uid]:myUser}}
      />

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {selected ? (
          <ChatWindow
            conv={allUsers[selected.id] ? {...allUsers[selected.id],...selected} : selected}
            myUid={user.uid}
            myUser={myUser}
            allUsers={{...allUsers,[user.uid]:myUser}}
            onHeaderClick={()=>setShowInfoPanel(v=>!v)}
          />
        ) : (
          <div className="empty-state">
            <div className="empty-icon">∞</div>
            <div className="empty-title">Infinite Chats</div>
            <div className="empty-sub">Search for someone above or select a conversation to get started.</div>
          </div>
        )}
      </div>

      {(showInfoPanel || window.innerWidth >= 1025) && selected && (
        <InfoPanel
          conv={allUsers[selected.id] ? {...allUsers[selected.id],...selected} : selected}
          myUid={user.uid}
          allUsers={allUsers}
          presences={presences}
          onClose={()=>setShowInfoPanel(false)}
        />
      )}

      {showNewGroup && (
        <CreateGroupModal
          myUid={user.uid}
          onClose={()=>setShowNewGroup(false)}
          onCreate={g=>{setGroups(prev=>[...prev.filter(x=>x.id!==g.id),g]);setSelected({...g,type:'group'});showToast('Group created!');}}
        />
      )}
      {showSettings && (
        <SettingsModal
          user={myUser}
          onClose={()=>setShowSettings(false)}
          onThemeChange={handleThemeChange}
          onStatusChange={handleStatusChange}
        />
      )}
      {showProfile && (
        <ProfileModal
          user={myUser}
          myUid={user.uid}
          onClose={()=>setShowProfile(false)}
          onSave={handleProfileSave}
        />
      )}
      {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
