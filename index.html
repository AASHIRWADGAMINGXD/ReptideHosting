<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reptide Hosting - Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://wallpapercave.com/wp/wp2565076.png') no-repeat center center/cover;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            color: #00ff00;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            width: 90%;
            max-width: 600px;
            margin: 10vh auto;
            border: 4px solid #00ff00;
            box-shadow: 0px 0px 15px #00ff00;
            border-radius: 10px;
        }

        h1 {
            font-size: 24px;
        }

        h2 {
            font-size: 18px;
            color: #ffcc00;
        }

        p {
            font-size: 12px;
            margin: 15px 0;
        }

        .countdown {
            font-size: 20px;
            color: #ff4444;
            margin: 15px 0;
            animation: fadeIn 1s ease-in-out infinite alternate;
        }

        @keyframes fadeIn {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .notify-btn {
            background: #00ff00;
            color: black;
            padding: 10px;
            border: 2px solid black;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            margin: 15px 0;
            width: 100%;
            max-width: 200px;
        }

        .notify-btn:hover {
            background: #ffcc00;
        }

        .social-links a {
            display: inline-block;
            color: #ffcc00;
            text-decoration: none;
            font-size: 12px;
            margin: 10px;
        }

        footer {
            margin-top: 15px;
            font-size: 10px;
            color: #ccc;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            h2 { font-size: 16px; }
            p { font-size: 11px; }
            .container { width: 95%; padding: 15px; }
            .countdown { font-size: 16px; }
            .notify-btn { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌊 Reptide Hosting</h1>
        <h2>Coming March 10, 2025</h2>
        <p>The ultimate Minecraft server hosting experience is almost here!</p>
        
        <div class="countdown" id="countdown">Loading...</div>

        <button class="notify-btn">Notify Me</button>
        
        <div class="social-links">
            <a href="#">Discord</a>
            <a href="#">Twitter/X</a>
            <a href="#">Instagram</a>
        </div>

        <footer>© 2025 Reptide Hosting. All rights reserved.</footer>
    </div>

    <script>
        function updateCountdown() {
            const launchDate = new Date("March 11, 2025 00:00:00").getTime();
            const now = new Date().getTime();
            const timeLeft = launchDate - now;

            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            if (timeLeft > 0) {
                document.getElementById("countdown").innerHTML = 
                    `🕒 ${days}d ${hours}h ${minutes}m ${seconds}s`;
            } else {
                document.getElementById("countdown").innerHTML = "🎉 We Are Live!";
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
